services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: txloom
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-txloom}
      MYSQL_USER: ${MYSQL_USER:-txloom}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-txloom}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: mysql://${MYSQL_USER:-txloom}:${MYSQL_PASSWORD:-txloom}@mysql:3306/txloom
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
    volumes:
      - ./data:/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-txloom}:${MYSQL_PASSWORD:-txloom}@mysql:3306/txloom
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
    volumes:
      - ./data:/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Optional local demo brokers for the streaming "history-to-live" demo
  # (User Story 4). Start with: docker compose --profile demo-brokers up
  #
  # Two listeners on Kafka because the two clients sit on different sides of
  # the compose network: the `worker` container (which actually publishes,
  # via the stream-drive job) reaches it at `kafka:29092`; host-side tools
  # (a local kcat, the CLI run outside compose) use `localhost:9092`. A
  # single "localhost"-advertised listener works for host clients but breaks
  # for in-network clients — Kafka tells them to reconnect to the advertised
  # address, and "localhost" inside the worker container is the worker
  # itself, not the broker.
  kafka:
    image: apache/kafka:3.9.0
    profiles: ["demo-brokers"]
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      # Single-broker cluster — the internal __consumer_offsets/transaction
      # logs default to a replication factor of 3, which a lone broker can
      # never satisfy, so consumer group coordination fails forever
      # (COORDINATOR_NOT_AVAILABLE) unless these are pinned to 1. Without
      # this, no consumer group can ever read from this broker.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

  # RabbitMQ needs no such split: `worker`/`api` reach it at `rabbitmq:5672`
  # (compose DNS) and the host reaches it at `localhost:5672`, both valid —
  # AMQP has no advertised-listener redirect step.
  rabbitmq:
    image: rabbitmq:4-management-alpine
    profiles: ["demo-brokers"]
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mysql-data:
  redis-data:
