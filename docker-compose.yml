services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: txloom
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-txloom}
      MYSQL_USER: ${MYSQL_USER:-txloom}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-txloom}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: mysql://${MYSQL_USER:-txloom}:${MYSQL_PASSWORD:-txloom}@mysql:3306/txloom
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
    volumes:
      - ./data:/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-txloom}:${MYSQL_PASSWORD:-txloom}@mysql:3306/txloom
      REDIS_URL: redis://redis:6379
      DATA_DIR: /data
    volumes:
      - ./data:/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Optional local demo brokers for the streaming "history-to-live" demo.
  # Start with: docker compose --profile demo-brokers up
  kafka:
    image: apache/kafka:3.9.0
    profiles: ["demo-brokers"]
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

  rabbitmq:
    image: rabbitmq:4-management-alpine
    profiles: ["demo-brokers"]
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mysql-data:
  redis-data:
