name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "22"

jobs:
  static:
    name: Static gate (typecheck, lint, format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format

  test:
    name: Test gate (unit + contract + component, includes golden-master)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # packages/engine/tests/golden-master fails the build on any output
      # drift for the fixed seed+spec reference (constitution Principle II/III;
      # T195) — it's part of the `unit` project, so plain `pnpm test` wires it in.
      - run: pnpm test

  integration:
    name: "Integration gate (Testcontainers: MySQL, Redis, Kafka, RabbitMQ)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Testcontainers drives its own ephemeral MySQL/Redis/Kafka/RabbitMQ
      # containers against the runner's Docker daemon (pre-installed on
      # GitHub-hosted Ubuntu runners) — no declarative `services:` needed.
      - run: pnpm test:integration

  bench-smoke:
    name: Performance gate (Kafka smoke benchmark, regression threshold)
    runs-on: ubuntu-latest
    services:
      kafka:
        image: apache/kafka:3.9.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: "1"
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: KAFKA_BROKERS=localhost:9092 pnpm bench:smoke
